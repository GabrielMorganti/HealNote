{% extends 'base.html' %}

{% block content %}
<div class="card justify-content-center">
    <h1>{% if object %}Editar{% else %}Novo{% endif %} medicamento</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button class="btn btn-primary" type="submit">Salvar</button>
            <a class="btn btn-danger" href="{% url 'medicamento_list' %}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
