{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 700px;">
    <h1>Nova receita medica</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button class="btn btn-primary" type="submit">Enviar e processar OCR</button>
            <a class="btn btn-danger" href="{% url 'receita_list' %}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
