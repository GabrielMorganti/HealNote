{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 620px; margin: 1rem auto;">
    <h1>Criar conta</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button class="btn btn-success" type="submit">Cadastrar</button>
            <a class="btn btn-primary" href="{% url 'login' %}">Ja tenho conta</a>
        </div>
    </form>
</div>
{% endblock %}
